<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FFFFFF">
<title>Morgenjournal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --white:#FFFFFF;--bg:#F8F8F6;--bg2:#F0F0EE;--bg3:#E6E6E4;
  --text:#0D0D0D;--text2:#3C3C3A;--muted:#888886;--faint:#C2C2C0;
  --border:#E4E4E2;--border2:#D0D0CE;--black:#0D0D0D;
  --r:10px;--r-sm:6px;--shadow:0 1px 3px rgba(0,0,0,.05),0 2px 10px rgba(0,0,0,.04);
}
html,body{background:var(--bg);font-family:'Barlow',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh;font-size:16px}

/* ── AUTH SCREEN ─────────────────────────────── */
#auth-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;background:var(--bg);
}
.auth-box{
  background:var(--white);border:1px solid var(--border);
  border-radius:14px;padding:40px 44px;width:100%;max-width:420px;
  box-shadow:var(--shadow);
}
@media(max-width:480px){.auth-box{padding:28px 24px}}
.auth-logo{
  font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;color:var(--black);
  margin-bottom:6px;
}
.auth-logo span{font-weight:300;font-style:italic}
.auth-tagline{font-size:13px;color:var(--muted);margin-bottom:32px}
.auth-tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--bg2);border-radius:var(--r-sm);padding:3px}
.auth-tab{
  flex:1;padding:8px;border:none;background:none;
  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
  cursor:pointer;border-radius:5px;transition:all .12s;
}
.auth-tab.active{background:var(--white);color:var(--black);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.form-group{margin-bottom:16px}
.form-label{
  font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:1.8px;text-transform:uppercase;color:var(--muted);
  margin-bottom:7px;display:block;
}
.form-input{
  width:100%;border:1px solid var(--border);border-radius:var(--r-sm);
  padding:11px 14px;font-family:'Barlow',sans-serif;font-size:15px;
  color:var(--text);background:var(--bg2);outline:none;
  transition:border-color .15s,background .15s;
}
.form-input:focus{border-color:var(--black);background:var(--white)}
.form-input::placeholder{color:var(--faint)}
.btn-auth{
  display:block;width:100%;padding:14px;background:var(--black);color:var(--white);
  border:none;border-radius:var(--r);font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  cursor:pointer;transition:opacity .15s;margin-top:4px;
}
.btn-auth:hover{opacity:.82}
.btn-auth:disabled{opacity:.4;cursor:not-allowed}
.auth-error{
  font-size:12.5px;color:#B04040;background:#FBF0F0;
  border:1px solid #F0D0D0;border-radius:var(--r-sm);
  padding:10px 14px;margin-bottom:14px;display:none;
}
.auth-error.show{display:block}
.auth-success{
  font-size:12.5px;color:#3A7A50;background:#EFF7F2;
  border:1px solid #C8E8D4;border-radius:var(--r-sm);
  padding:10px 14px;margin-bottom:14px;display:none;
}
.auth-success.show{display:block}

/* ── APP SHELL ───────────────────────────────── */
#app-shell{display:none}

/* ── TOPBAR ──────────────────────────────────── */
.topbar{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.topbar-inner{
  max-width:1100px;margin:0 auto;padding:0 32px;height:58px;
  display:flex;align-items:center;justify-content:space-between;gap:20px;
}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--black);white-space:nowrap;flex-shrink:0}
.logo span{font-weight:300;font-style:italic}
.topnav{display:flex;gap:2px}
.tnav-btn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer;padding:7px 14px;border-radius:var(--r-sm);transition:background .12s,color .12s;white-space:nowrap}
.tnav-btn:hover{background:var(--bg2);color:var(--text2)}
.tnav-btn.active{background:var(--black);color:var(--white)}
.topbar-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar-user{font-size:12px;color:var(--muted);white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis}
.btn-logout{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);background:none;border:1px solid var(--border);border-radius:var(--r-sm);padding:5px 12px;cursor:pointer;transition:all .12s;white-space:nowrap}
.btn-logout:hover{color:var(--black);border-color:var(--border2)}
@media(max-width:640px){
  .topbar-inner{padding:0 16px}
  .topbar-user{display:none}
  .logo{font-size:14px;letter-spacing:2px}
  .tnav-btn{padding:6px 10px;font-size:10px}
}

/* ── LAYOUT ──────────────────────────────────── */
.wrap{max-width:1100px;margin:0 auto;padding:48px 32px 80px}
@media(max-width:640px){.wrap{padding:24px 16px 60px}}
.page{display:none;animation:fadeUp .2s ease both}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── TODAY STATUS ─────────────────────────────── */
.today-status{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:22px 28px;margin-bottom:28px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.today-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.today-date{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:700;color:var(--black);letter-spacing:-.3px;text-transform:capitalize}
.status-pill{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:6px 16px;border-radius:20px;white-space:nowrap}
.status-pill.done{background:var(--black);color:var(--white)}
.status-pill.open{background:var(--bg3);color:var(--muted)}

/* ── JOURNAL LAYOUT ──────────────────────────── */
.journal-layout{display:grid;grid-template-columns:1fr 360px;gap:28px;align-items:start}
@media(max-width:880px){.journal-layout{grid-template-columns:1fr}}

/* ── QUESTION CARDS ──────────────────────────── */
.q-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:28px 32px;margin-bottom:14px;box-shadow:var(--shadow);transition:border-color .15s}
.q-card:focus-within{border-color:var(--border2)}
.q-num{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--faint);margin-bottom:7px}
.q-title{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;color:var(--black);line-height:1.15;letter-spacing:-.2px;margin-bottom:8px;text-transform:uppercase}
.q-hint{font-size:13px;font-style:italic;color:var(--muted);font-weight:300;line-height:1.6;margin-bottom:14px}
.q-hint strong{font-weight:500;font-style:normal;color:var(--text2)}
.q-hint ul{list-style:none;padding-left:4px;margin-top:5px}
.q-hint ul li::before{content:'→ ';color:var(--faint)}
.q-hint ul li{margin-bottom:1px}
.q-textarea{width:100%;border:1px solid var(--border);border-radius:var(--r-sm);padding:13px 15px;font-family:'Barlow',sans-serif;font-size:15px;font-weight:400;color:var(--text);background:var(--bg);outline:none;resize:none;line-height:1.65;transition:border-color .15s,background .15s;min-height:76px}
.q-textarea:focus{border-color:var(--black);background:var(--white)}
.q-textarea::placeholder{color:var(--faint)}
.q-textarea.done-val{background:var(--bg2);border-color:var(--border);color:var(--text2)}

.save-row{display:flex;align-items:center;gap:12px;margin-top:6px;flex-wrap:wrap}
.btn-save{padding:13px 32px;background:var(--black);color:var(--white);border:none;border-radius:var(--r);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;transition:opacity .15s,transform .1s}
.btn-save:hover{opacity:.82}
.btn-save:active{transform:scale(.98)}
.btn-save:disabled{opacity:.4;cursor:not-allowed}
.btn-edit{padding:13px 22px;background:none;color:var(--muted);border:1px solid var(--border);border-radius:var(--r);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:background .12s,color .12s}
.btn-edit:hover{background:var(--bg2);color:var(--text2)}
.save-hint{font-size:12px;color:var(--faint)}

/* ── SIDEBAR ─────────────────────────────────── */
.streak-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:24px 28px;box-shadow:var(--shadow)}
.streak-top{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.streak-row{display:flex;gap:0;margin-bottom:20px}
.streak-stat{flex:1;text-align:center;padding:0 8px}
.streak-stat+.streak-stat{border-left:1px solid var(--border)}
.streak-n{font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:700;color:var(--black);line-height:1;letter-spacing:-1px}
.streak-l{font-size:11px;color:var(--muted);margin-top:3px}
.sync-status{font-size:11px;color:var(--faint);text-align:center;margin-bottom:16px;font-style:italic}
.sync-status.synced{color:#5A8A65}
.sync-status.syncing{color:var(--muted)}
.sync-status.error{color:#B04040}

/* mini cal */
.mini-cal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mini-cal-month{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--black)}
.cal-nav-btn{width:26px;height:26px;background:none;border:1px solid var(--border);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);transition:background .1s}
.cal-nav-btn:hover{background:var(--bg2)}
.mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.mc-wd{text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--faint);padding:3px 0}
.mc-day{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:500;transition:opacity .1s}
.mc-day.empty{background:none;color:transparent}
.mc-day.future{background:none;color:var(--border)}
.mc-day.noentry{background:var(--bg2);color:var(--faint)}
.mc-day.entry{background:var(--black);color:var(--white);font-weight:700;cursor:pointer}
.mc-day.entry:hover{opacity:.75}
.mc-day.today-no{border:1.5px solid var(--black);color:var(--black);font-weight:700}
.mc-day.today-yes{background:var(--black);color:var(--white);font-weight:700}

/* ── DIARY ───────────────────────────────────── */
.diary-toolbar{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.diary-search{flex:1;min-width:200px;border:1px solid var(--border);border-radius:var(--r-sm);padding:9px 14px;font-family:'Barlow',sans-serif;font-size:14px;color:var(--text);background:var(--white);outline:none;transition:border-color .15s}
.diary-search:focus{border-color:var(--black)}
.diary-search::placeholder{color:var(--faint)}
.diary-count{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--faint);white-space:nowrap}
.diary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
@media(max-width:640px){.diary-grid{grid-template-columns:1fr}}
.diary-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:26px 28px 22px;box-shadow:var(--shadow);cursor:pointer;transition:border-color .15s,box-shadow .15s}
.diary-card:hover{border-color:var(--border2);box-shadow:0 3px 16px rgba(0,0,0,.08)}
.diary-card-meta{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:flex;justify-content:space-between}
.diary-card-day{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;color:var(--black);letter-spacing:-.2px;margin-bottom:14px;text-transform:capitalize}
.dep-q{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);margin-bottom:2px;margin-top:10px}
.dep-q:first-of-type{margin-top:0}
.dep-a{font-size:13px;color:var(--text2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ── DETAIL OVERLAY ──────────────────────────── */
.det-overlay{position:fixed;inset:0;background:rgba(13,13,13,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.det-overlay.open{opacity:1;pointer-events:all}
.det-panel{background:var(--white);border-radius:14px;width:100%;max-width:580px;max-height:88vh;overflow-y:auto;padding:36px 40px;transform:translateY(14px) scale(.98);transition:transform .22s cubic-bezier(.4,0,.2,1);box-shadow:0 8px 40px rgba(0,0,0,.14)}
@media(max-width:600px){.det-panel{padding:22px 18px;border-radius:12px}}
.det-overlay.open .det-panel{transform:translateY(0) scale(1)}
.det-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:26px;gap:16px}
.det-date-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.det-date{font-family:'Barlow Condensed',sans-serif;font-size:23px;font-weight:700;color:var(--black);letter-spacing:-.3px;text-transform:capitalize}
.det-close{width:32px;height:32px;flex-shrink:0;background:var(--bg2);border:1px solid var(--border);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--muted);transition:background .1s;line-height:1}
.det-close:hover{background:var(--bg3);color:var(--black)}
.det-q{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.det-q:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.det-q-num{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--faint);margin-bottom:3px}
.det-q-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--black);letter-spacing:-.1px;text-transform:uppercase;margin-bottom:9px}
.det-q-ans{font-size:15px;color:var(--text2);line-height:1.7;white-space:pre-wrap}
.det-q-ans.empty{font-style:italic;color:var(--faint)}
.det-del-row{margin-top:24px;padding-top:18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end}
.btn-del{padding:9px 18px;background:none;color:var(--faint);border:1px solid var(--border);border-radius:var(--r-sm);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .1s}
.btn-del:hover{border-color:var(--black);color:var(--black);background:var(--bg2)}

/* ── PAGE HEADER ─────────────────────────────── */
.pg-hd{margin-bottom:32px}
.pg-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(24px,3.5vw,40px);font-weight:700;color:var(--black);line-height:1;letter-spacing:-.5px;text-transform:uppercase}
.pg-title span{font-weight:300;font-style:italic}
.pg-sub{font-size:14px;color:var(--muted);margin-top:5px}

/* ── TOAST ───────────────────────────────────── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--black);color:var(--white);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:11px 24px;border-radius:40px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── LOADING SPINNER ─────────────────────────── */
.spinner-wrap{display:flex;align-items:center;justify-content:center;padding:60px 20px}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--black);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 20px;color:var(--faint);font-style:italic;font-size:14px}
.empty-state strong{display:block;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);font-style:normal;margin-bottom:8px}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     AUTH SCREEN
═══════════════════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">Morgen<span>journal</span></div>
    <div class="auth-tagline">Dein tägliches 5-Fragen-Journal</div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login">Anmelden</button>
      <button class="auth-tab" id="tab-signup">Registrieren</button>
    </div>

    <div class="auth-error" id="auth-error"></div>
    <div class="auth-success" id="auth-success"></div>

    <div class="form-group">
      <label class="form-label">E-Mail</label>
      <input class="form-input" type="email" id="auth-email" placeholder="deine@email.com" autocomplete="email">
    </div>
    <div class="form-group" id="auth-name-group" style="display:none">
      <label class="form-label">Name (optional)</label>
      <input class="form-input" type="text" id="auth-name" placeholder="Dein Name">
    </div>
    <div class="form-group">
      <label class="form-label">Passwort</label>
      <input class="form-input" type="password" id="auth-password" placeholder="Mindestens 6 Zeichen" autocomplete="current-password">
    </div>

    <button class="btn-auth" id="btn-auth">Anmelden</button>

    <div style="font-size:11px;color:var(--faint);text-align:center;margin-top:16px;line-height:1.5">
      Deine Daten werden sicher in Supabase gespeichert.<br>Kein Spam, keine Weitergabe.
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     APP SHELL
═══════════════════════════════════════════ -->
<div id="app-shell">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="logo">Morgen<span>journal</span></div>
      <nav class="topnav">
        <button class="tnav-btn active" data-page="journal">Journal</button>
        <button class="tnav-btn" data-page="diary">Einträge</button>
      </nav>
      <div class="topbar-right">
        <div class="topbar-user" id="topbar-user"></div>
        <button class="btn-logout" id="btn-logout">Abmelden</button>
      </div>
    </div>
  </header>

  <div class="wrap">
    <!-- JOURNAL PAGE -->
    <div id="page-journal" class="page active">
      <div class="today-status">
        <div>
          <div class="today-lbl">Heute</div>
          <div class="today-date" id="today-full-date"></div>
        </div>
        <div class="status-pill open" id="today-status-pill">Noch offen</div>
      </div>

      <div class="journal-layout">
        <div id="journal-left"></div>
        <div>
          <div class="streak-card">
            <div class="streak-top">Statistik</div>
            <div class="streak-row">
              <div class="streak-stat"><div class="streak-n" id="stat-streak">—</div><div class="streak-l">Tage in Folge</div></div>
              <div class="streak-stat"><div class="streak-n" id="stat-total">—</div><div class="streak-l">Gesamt</div></div>
            </div>
            <div class="sync-status" id="sync-status">Verbunden</div>
            <div class="mini-cal-hd">
              <button class="cal-nav-btn" id="cal-prev">‹</button>
              <div class="mini-cal-month" id="cal-month-nm"></div>
              <button class="cal-nav-btn" id="cal-next">›</button>
            </div>
            <div class="mini-cal-grid" id="mini-cal"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- DIARY PAGE -->
    <div id="page-diary" class="page">
      <div class="pg-hd">
        <h1 class="pg-title">Mein <span>Tagebuch</span></h1>
        <p class="pg-sub">Alle gespeicherten Morgeneinträge.</p>
      </div>
      <div class="diary-toolbar">
        <input class="diary-search" id="diary-search" type="text" placeholder="Einträge durchsuchen…">
        <div class="diary-count" id="diary-count"></div>
      </div>
      <div class="diary-grid" id="diary-grid"></div>
    </div>
  </div>
</div>

<!-- DETAIL OVERLAY -->
<div class="det-overlay" id="det-overlay">
  <div class="det-panel">
    <div class="det-hd">
      <div><div class="det-date-lbl">Eintrag</div><div class="det-date" id="det-date"></div></div>
      <button class="det-close" id="det-close">×</button>
    </div>
    <div id="det-body"></div>
    <div class="det-del-row"><button class="btn-del" id="btn-del-entry">Eintrag löschen</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════
   ⚙️  KONFIGURATION — hier deine Supabase-Daten eintragen
═══════════════════════════════════════════ */
const SUPABASE_URL  = 'https://rdfpytvhpxgorjtamixk.supabase.co';
const SUPABASE_ANON = 'sb_publishable_Ha_GyNnQEojpwyH3agiaHQ_TYTmQWGl'; // langer JWT-String

/* ═══════════════════════════════════════════
   SUPABASE CLIENT
═══════════════════════════════════════════ */
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

/* ═══════════════════════════════════════════
   QUESTIONS
═══════════════════════════════════════════ */
const QUESTIONS = [
  { id:'focus',    num:'01', title:'Was ist heute mein wichtigster Fortschritt?',     hint:`Nicht viele Aufgaben. Nur eine Sache:<br>Wenn ich heute nur <strong>eine Sache</strong> schaffe — welche bringt mich wirklich vorwärts?`, placeholder:'Die eine Sache, die heute wirklich zählt…' },
  { id:'ideal',    num:'02', title:'Wie würde mein ideales Ich heute handeln?',        hint:`Denk kurz an dein zukünftiges Selbst.<br>Wie würde diese Person heute <strong>denken und handeln</strong>?`, placeholder:'Mein ideales Ich würde heute…' },
  { id:'habit',    num:'03', title:'Welche eine Gewohnheit ist heute entscheidend?',   hintList:['Training','Englisch','Fokusarbeit','Disziplin'], hintEnd:'Welche Gewohnheit darf ich heute auf <strong>keinen Fall</strong> auslassen?', placeholder:'Die Gewohnheit, die ich heute auf keinen Fall auslasse…' },
  { id:'obstacle', num:'04', title:'Was könnte mich heute zurückhalten?',              hintList:['Müdigkeit','Ablenkung','Social Media','Aufschieben'], hintEnd:'Wovor muss ich heute <strong>bewusst aufpassen</strong>?', placeholder:'Das Hindernis, das ich heute überwinden muss…' },
  { id:'grateful', num:'05', title:'Wofür bin ich heute dankbar?',                     hint:`Das bringt dich sofort in eine positive Haltung.<br>Was ist heute bereits <strong>gut in meinem Leben</strong>?`, placeholder:'Ich bin heute dankbar für…' },
];

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
const today   = () => new Date().toISOString().split('T')[0];
const fmtDE   = iso => { try { return new Date(iso+'T12:00').toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long',year:'numeric'}) } catch { return iso }};
const fmtShort= iso => { try { return new Date(iso+'T12:00').toLocaleDateString('de-DE',{day:'numeric',month:'long',year:'numeric'}) } catch { return iso }};
const esc     = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const WDS     = ['Mo','Di','Mi','Do','Fr','Sa','So'];

let _tt;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2400); }
function setSyncStatus(state,msg){ const el=document.getElementById('sync-status'); el.textContent=msg; el.className='sync-status '+state; }

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let curUser   = null;
let allEntries = {};   // { 'YYYY-MM-DD': { focus, ideal, habit, obstacle, grateful } }
let curPage   = 'journal';
let calY      = new Date().getFullYear();
let calM      = new Date().getMonth();
let detailDate = null;
let searchQ   = '';

/* ═══════════════════════════════════════════
   AUTH
═══════════════════════════════════════════ */
let authMode = 'login';

document.getElementById('tab-login').addEventListener('click', () => {
  authMode = 'login';
  document.getElementById('tab-login').classList.add('active');
  document.getElementById('tab-signup').classList.remove('active');
  document.getElementById('auth-name-group').style.display = 'none';
  document.getElementById('btn-auth').textContent = 'Anmelden';
  document.getElementById('auth-error').classList.remove('show');
  document.getElementById('auth-success').classList.remove('show');
});
document.getElementById('tab-signup').addEventListener('click', () => {
  authMode = 'signup';
  document.getElementById('tab-signup').classList.add('active');
  document.getElementById('tab-login').classList.remove('active');
  document.getElementById('auth-name-group').style.display = 'block';
  document.getElementById('btn-auth').textContent = 'Konto erstellen';
  document.getElementById('auth-error').classList.remove('show');
  document.getElementById('auth-success').classList.remove('show');
});

document.getElementById('btn-auth').addEventListener('click', handleAuth);
document.getElementById('auth-password').addEventListener('keydown', e => { if(e.key==='Enter') handleAuth(); });

async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl = document.getElementById('auth-error');
  const sucEl = document.getElementById('auth-success');
  const btn = document.getElementById('btn-auth');

  errEl.classList.remove('show'); sucEl.classList.remove('show');
  if(!email||!password){ errEl.textContent='Bitte E-Mail und Passwort eingeben.'; errEl.classList.add('show'); return; }

  btn.disabled = true;
  btn.textContent = authMode==='login' ? 'Anmelden…' : 'Konto wird erstellt…';

  if(authMode === 'login'){
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if(error){ errEl.textContent = mapAuthError(error.message); errEl.classList.add('show'); }
  } else {
    const name = document.getElementById('auth-name').value.trim();
    const { error } = await sb.auth.signUp({ email, password, options: { data: { display_name: name||email.split('@')[0] }}});
    if(error){ errEl.textContent = mapAuthError(error.message); errEl.classList.add('show'); }
    else { sucEl.textContent = 'Fast fertig! Bitte bestätige deine E-Mail-Adresse.'; sucEl.classList.add('show'); }
  }
  btn.disabled = false;
  btn.textContent = authMode==='login' ? 'Anmelden' : 'Konto erstellen';
}

function mapAuthError(msg){
  if(msg.includes('Invalid login')) return 'Falsche E-Mail oder Passwort.';
  if(msg.includes('Email not confirmed')) return 'Bitte bestätige zuerst deine E-Mail.';
  if(msg.includes('User already registered')) return 'Diese E-Mail ist bereits registriert.';
  return msg;
}

document.getElementById('btn-logout').addEventListener('click', async () => {
  await sb.auth.signOut();
});

// Auth state listener
sb.auth.onAuthStateChange(async (event, session) => {
  if(session?.user){
    curUser = session.user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-shell').style.display = 'block';
    document.getElementById('topbar-user').textContent =
      curUser.user_metadata?.display_name || curUser.email;
    document.getElementById('today-full-date').textContent =
      new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    await loadEntries();
    renderJournal();
  } else {
    curUser = null;
    allEntries = {};
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-shell').style.display = 'none';
  }
});

/* ═══════════════════════════════════════════
   DATABASE OPERATIONS
═══════════════════════════════════════════ */
async function loadEntries(){
  setSyncStatus('syncing', 'Lädt…');
  try {
    const { data, error } = await sb
      .from('journal_entries')
      .select('*')
      .order('date', { ascending: false });

    if(error) throw error;
    allEntries = {};
    (data||[]).forEach(row => {
      allEntries[row.date] = {
        focus: row.focus, ideal: row.ideal,
        habit: row.habit, obstacle: row.obstacle,
        grateful: row.grateful, savedAt: row.saved_at
      };
    });
    setSyncStatus('synced', '✓ Synchronisiert');
  } catch(e) {
    setSyncStatus('error', '⚠ Ladefehler');
    console.error(e);
  }
}

async function upsertEntry(dateKey, data){
  setSyncStatus('syncing', 'Speichert…');
  try {
    const { error } = await sb.from('journal_entries').upsert({
      user_id:  curUser.id,
      date:     dateKey,
      focus:    data.focus||null,
      ideal:    data.ideal||null,
      habit:    data.habit||null,
      obstacle: data.obstacle||null,
      grateful: data.grateful||null,
    }, { onConflict: 'user_id,date' });

    if(error) throw error;
    allEntries[dateKey] = {...data};
    setSyncStatus('synced', '✓ Gespeichert');
    return true;
  } catch(e) {
    setSyncStatus('error', '⚠ Speicherfehler');
    toast('Fehler beim Speichern');
    console.error(e);
    return false;
  }
}

async function removeEntry(dateKey){
  try {
    const { error } = await sb.from('journal_entries')
      .delete()
      .eq('user_id', curUser.id)
      .eq('date', dateKey);
    if(error) throw error;
    delete allEntries[dateKey];
    return true;
  } catch(e) {
    toast('Fehler beim Löschen');
    return false;
  }
}

/* ═══════════════════════════════════════════
   NAV
═══════════════════════════════════════════ */
function go(page){
  curPage=page;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tnav-btn').forEach(b=>b.classList.remove('active'));
  const p=document.getElementById('page-'+page);
  if(p){p.classList.add('active');void p.offsetWidth}
  const b=document.querySelector(`.tnav-btn[data-page="${page}"]`);
  if(b)b.classList.add('active');
  if(page==='journal'){renderJournal();renderMiniCal();}
  if(page==='diary')renderDiary();
}
document.querySelector('.topnav').addEventListener('click', e => {
  const btn=e.target.closest('.tnav-btn');
  if(btn)go(btn.dataset.page);
});

/* ═══════════════════════════════════════════
   STATS
═══════════════════════════════════════════ */
function calcStreak(){
  let streak=0, d=new Date();
  if(!allEntries[today()]) d.setDate(d.getDate()-1);
  for(let i=0;i<365;i++){
    const k=d.toISOString().split('T')[0];
    if(allEntries[k]){streak++;d.setDate(d.getDate()-1)}else break;
  }
  return streak;
}

/* ═══════════════════════════════════════════
   RENDER JOURNAL
═══════════════════════════════════════════ */
function renderJournal(){
  const dk = today();
  const entry = allEntries[dk];
  const saved = !!entry;

  const pill = document.getElementById('today-status-pill');
  pill.textContent = saved ? '✓ Eingetragen' : 'Noch offen';
  pill.className = 'status-pill '+(saved?'done':'open');

  document.getElementById('stat-streak').textContent = calcStreak();
  document.getElementById('stat-total').textContent = Object.keys(allEntries).length;

  function hintHtml(q){
    if(q.hint) return `<div class="q-hint">${q.hint}</div>`;
    if(q.hintList){
      let h=`<div class="q-hint"><ul>${q.hintList.map(i=>`<li>${i}</li>`).join('')}</ul>`;
      if(q.hintEnd) h+=`<br>${q.hintEnd}`;
      return h+'</div>';
    }
    return '';
  }

  let html = QUESTIONS.map(q => {
    const val=entry?.[q.id]||'';
    return `<div class="q-card">
      <div class="q-num">Frage ${q.num}</div>
      <div class="q-title">${q.title}</div>
      ${hintHtml(q)}
      <textarea class="q-textarea${saved?' done-val':''}" id="qa-${q.id}" placeholder="${q.placeholder}" rows="3"${saved?' readonly':''}>${esc(val)}</textarea>
    </div>`;
  }).join('');

  if(!saved){
    html += `<div class="save-row">
      <button class="btn-save" id="btn-save-journal">Eintrag speichern</button>
      <div class="save-hint">Wird in deiner Supabase-Datenbank gespeichert.</div>
    </div>`;
  } else {
    html += `<div class="save-row">
      <button class="btn-edit" id="btn-edit-journal">Bearbeiten</button>
      <div class="save-hint">Gespeichert — ${fmtShort(dk)}</div>
    </div>`;
  }

  document.getElementById('journal-left').innerHTML = html;

  const saveBtn = document.getElementById('btn-save-journal');
  if(saveBtn){
    saveBtn.addEventListener('click', async () => {
      saveBtn.disabled=true; saveBtn.textContent='Speichert…';
      const data={};
      QUESTIONS.forEach(q=>{ data[q.id]=(document.getElementById('qa-'+q.id)?.value||'').trim(); });
      const ok = await upsertEntry(dk, data);
      if(ok){ renderJournal(); renderMiniCal(); toast('Eintrag gespeichert ✓'); }
      else { saveBtn.disabled=false; saveBtn.textContent='Eintrag speichern'; }
    });
  }

  const editBtn = document.getElementById('btn-edit-journal');
  if(editBtn){
    editBtn.addEventListener('click', () => {
      QUESTIONS.forEach(q=>{
        const ta=document.getElementById('qa-'+q.id);
        if(ta){ta.removeAttribute('readonly');ta.classList.remove('done-val')}
      });
      const row = editBtn.parentElement;
      row.innerHTML = `<button class="btn-save" id="btn-save-journal">Änderungen speichern</button><div class="save-hint">Änderungen werden gespeichert.</div>`;
      document.getElementById('btn-save-journal').addEventListener('click', async () => {
        const btn=document.getElementById('btn-save-journal');
        btn.disabled=true; btn.textContent='Speichert…';
        const data={};
        QUESTIONS.forEach(q=>{ data[q.id]=(document.getElementById('qa-'+q.id)?.value||'').trim(); });
        const ok=await upsertEntry(dk,data);
        if(ok){ renderJournal(); renderMiniCal(); toast('Gespeichert ✓'); }
        else { btn.disabled=false; btn.textContent='Änderungen speichern'; }
      });
    });
  }
  renderMiniCal();
}

/* ═══════════════════════════════════════════
   MINI CALENDAR
═══════════════════════════════════════════ */
function renderMiniCal(){
  const tnow=new Date(), tY=tnow.getFullYear(), tM=tnow.getMonth(), tD=tnow.getDate();
  const moPfx=calY+'-'+String(calM+1).padStart(2,'0');
  document.getElementById('cal-month-nm').textContent=
    new Date(calY,calM,1).toLocaleDateString('de-DE',{month:'long',year:'numeric'}).toUpperCase();
  const fd=new Date(calY,calM,1).getDay(), off=fd===0?6:fd-1;
  const dim=new Date(calY,calM+1,0).getDate();
  let cells=WDS.map(w=>`<div class="mc-wd">${w}</div>`).join('');
  cells+=Array(off).fill('<div class="mc-day empty"></div>').join('');
  for(let d=1;d<=dim;d++){
    const iso=moPfx+'-'+String(d).padStart(2,'0');
    const isT=(d===tD&&calM===tM&&calY===tY);
    const isF=new Date(calY,calM,d)>tnow&&!isT;
    const has=!!allEntries[iso];
    let cls=isF?'future':isT?(has?'today-yes':'today-no'):(has?'entry':'noentry');
    const attr=has&&!isF?`data-entry-date="${iso}"`:'';
    cells+=`<div class="mc-day ${cls}" ${attr}>${d}</div>`;
  }
  document.getElementById('mini-cal').innerHTML=cells;
}
document.getElementById('cal-prev').addEventListener('click',()=>{ calM--;if(calM<0){calM=11;calY--}renderMiniCal(); });
document.getElementById('cal-next').addEventListener('click',()=>{ const t=new Date();if(calY===t.getFullYear()&&calM===t.getMonth())return;calM++;if(calM>11){calM=0;calY++}renderMiniCal(); });
document.getElementById('mini-cal').addEventListener('click',e=>{
  const c=e.target.closest('[data-entry-date]');
  if(c)openDetail(c.dataset.entryDate);
});

/* ═══════════════════════════════════════════
   DIARY
═══════════════════════════════════════════ */
function renderDiary(){
  const keys=Object.keys(allEntries).sort((a,b)=>b.localeCompare(a));
  const q=searchQ.toLowerCase().trim();
  const filtered=q?keys.filter(k=>{
    const e=allEntries[k];
    return QUESTIONS.some(qu=>(e[qu.id]||'').toLowerCase().includes(q))||fmtDE(k).toLowerCase().includes(q);
  }):keys;

  document.getElementById('diary-count').textContent=filtered.length?filtered.length+' Einträge':'';
  const grid=document.getElementById('diary-grid');
  if(!filtered.length){
    grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><strong>Keine Einträge</strong>${q?'Keine Treffer für "'+esc(q)+'"':'Schreibe deinen ersten Eintrag im Journal.'}</div>`;
    return;
  }
  grid.innerHTML=filtered.map(k=>{
    const e=allEntries[k];
    const preview=QUESTIONS.slice(0,2).map(q=>{
      const a=(e[q.id]||'').trim();
      return a?`<div class="dep-q">Frage ${q.num}</div><div class="dep-a">${esc(a)}</div>`:'';
    }).filter(Boolean).join('');
    return `<div class="diary-card" data-dk="${k}">
      <div class="diary-card-meta"><span>${fmtShort(k)}</span><span>${new Date(k+'T12:00').toLocaleDateString('de-DE',{weekday:'long'})}</span></div>
      <div class="diary-card-day">${fmtDE(k)}</div>
      <div>${preview||'<div class="dep-a" style="color:var(--faint);font-style:italic">Keine Antworten.</div>'}</div>
    </div>`;
  }).join('');
}
document.getElementById('diary-grid').addEventListener('click',e=>{
  const c=e.target.closest('[data-dk]');
  if(c)openDetail(c.dataset.dk);
});
document.getElementById('diary-search').addEventListener('input',e=>{ searchQ=e.target.value; renderDiary(); });

/* ═══════════════════════════════════════════
   DETAIL OVERLAY
═══════════════════════════════════════════ */
function openDetail(dk){
  detailDate=dk;
  const e=allEntries[dk]; if(!e)return;
  document.getElementById('det-date').textContent=fmtDE(dk);
  document.getElementById('det-body').innerHTML=QUESTIONS.map(q=>{
    const a=(e[q.id]||'').trim();
    return `<div class="det-q">
      <div class="det-q-num">Frage ${q.num}</div>
      <div class="det-q-title">${q.title}</div>
      <div class="det-q-ans${a?'':' empty'}">${a?esc(a).replace(/\n/g,'<br>'):'Keine Antwort eingetragen.'}</div>
    </div>`;
  }).join('');
  document.getElementById('det-overlay').classList.add('open');
}
function closeDetail(){ document.getElementById('det-overlay').classList.remove('open'); detailDate=null; }
document.getElementById('det-overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('det-overlay'))closeDetail(); });
document.getElementById('det-close').addEventListener('click',closeDetail);
document.getElementById('btn-del-entry').addEventListener('click', async () => {
  if(!detailDate)return;
  if(!confirm('Eintrag vom '+fmtShort(detailDate)+' wirklich löschen?'))return;
  const ok=await removeEntry(detailDate);
  if(ok){ closeDetail(); if(curPage==='diary')renderDiary(); if(curPage==='journal')renderJournal(); renderMiniCal(); toast('Eintrag gelöscht'); }
});

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
document.getElementById('top-date') && (document.getElementById('top-date').textContent =
  new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long',year:'numeric'}));
</script>
</body>
</html>
